<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Exhibition</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5CCG4L63S9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-5CCG4L63S9');
  </script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.min.js"></script>
  <script src="/js/scripts.js"></script>

</head>

<body>
  <a-scene mindar-image="imageTargetSrc: ./assets/printed_targets.mind;" xr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false" autoStart="false">
    <a-assets>
      <video id="fasaKariesGigi"
        src="https://res.cloudinary.com/dzwzi3idm/video/upload/v1727084833/fasa_karies_gigi_vqzprh.mp4" muted></video>
      <a-mixin id="marker" geometry="primitive: box" material="color: magenta; shader: flat; opacity: 0.5"
        scale="0.01 0.01 0.01"></a-mixin>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
      raycaster="far: ${customFields.libVersion}; objects: .clickable"></a-camera>

    <a-entity id="arTarget" mindar-image-target="targetIndex: 0"
      renderer="colorManagement: true, physicallyCorrectLights">
      <a-entity text="value: Karies Gigi;" position="0 0 0.1"></a-entity>
      <a-video src="#fasaKariesGigi" position="0 0 0" width="0.9" height="1.555">
        <a-entity mixin="marker" position="-0.5 0 0"></a-entity>
        <a-entity mixin="marker" position="-0.25 0 0"></a-entity>
        <a-entity mixin="marker" position="0 0 0"></a-entity>
        <a-entity mixin="marker" position="0.25 0 0"></a-entity>
        <a-entity mixin="marker" position="0.5 0 0"></a-entity>
      </a-video>
    </a-entity>
  </a-scene>
</body>

</html>
